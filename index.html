<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Markør Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #header h1 { font-size: 16px; font-weight: 600; color: #f1f5f9; }
  #gps-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8; }
  #gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; transition: background 0.4s; }
  #gps-dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e88; animation: blink 1.8s ease-in-out infinite; }
  #gps-dot.error { background: #ef4444; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #map { flex: 1; }
  #panel { background: #1a1d27; border-top: 1px solid #2d3148; flex-shrink: 0; max-height: 220px; overflow-y: auto; }
  #panel-title { padding: 10px 16px 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; border-bottom: 1px solid #2d3148; }
  .marker-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #1e2235; transition: background 0.2s; }
  .marker-row:last-child { border-bottom: none; }
  .marker-row.reached { background: #0f2918; }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; background: #ef4444; transition: background 0.4s, box-shadow 0.4s; }
  .dot.green { background: #22c55e; box-shadow: 0 0 8px #22c55e66; }
  .marker-name { font-size: 13px; font-weight: 500; color: #cbd5e1; flex: 1; }
  .marker-dist { font-size: 13px; color: #94a3b8; font-variant-numeric: tabular-nums; min-width: 70px; text-align: right; }
  .marker-dist.close { color: #22c55e; font-weight: 600; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; background: #22c55e22; color: #22c55e; display: none; }
  .reached .badge { display: inline-block; }
  #accuracy-bar { padding: 8px 16px; font-size: 11px; color: #64748b; border-top: 1px solid #2d3148; }
  #error-msg { display: none; background: #1f1010; border: 1px solid #7f1d1d; color: #fca5a5; font-size: 13px; padding: 12px 16px; margin: 12px; border-radius: 8px; line-height: 1.6; }
</style>
</head>
<body>

<div id="header">
  <h1>📍 GPS Markør Tracker</h1>
  <div id="gps-status">
    <div id="gps-dot"></div>
    <span id="gps-text">Henter posisjon…</span>
  </div>
</div>

<div id="map"></div>

<div id="panel">
  <div id="panel-title">Markører</div>
  <div id="marker-list"></div>
  <div id="error-msg" id="error-msg"></div>
  <div id="accuracy-bar">Nøyaktighet: —</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const TARGETS = [
  { id: 1, name: "Markør 1", lat: 61.117189391299775, lon: 10.464565025004918 },
  { id: 2, name: "Markør 2", lat: 61.117226018834366, lon: 10.46634523282882  },
  { id: 3, name: "Markør 3", lat: 61.11486228921843,  lon: 10.464810138284342 },
];
const THRESHOLD = 10;

const map = L.map('map', { zoomControl: true }).setView([61.116, 10.465], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 20, attribution: '© OpenStreetMap'
}).addTo(map);

function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 22 14 22S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="${color}" stroke="white" stroke-width="2"/>
    <circle cx="14" cy="14" r="5" fill="white"/>
  </svg>`;
  return L.divIcon({ className:'', html:svg, iconSize:[28,36], iconAnchor:[14,36], popupAnchor:[0,-36] });
}

const redIcon   = makeIcon('#ef4444');
const greenIcon = makeIcon('#22c55e');

const leafletMarkers = TARGETS.map(t =>
  L.marker([t.lat, t.lon], { icon: redIcon }).addTo(map).bindPopup(`<b>${t.name}</b>`)
);

let userCircle = null;
let userDot    = null;
let centered   = false;

const list = document.getElementById('marker-list');
TARGETS.forEach(t => {
  const row = document.createElement('div');
  row.className = 'marker-row';
  row.id = 'row-' + t.id;
  row.innerHTML = `
    <div class="dot" id="dot-${t.id}"></div>
    <span class="marker-name">${t.name}</span>
    <span class="marker-dist" id="dist-${t.id}">—</span>
    <span class="badge">✓ Nådd</span>
  `;
  list.appendChild(row);
});

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(m) {
  if (m >= 1000) return (m/1000).toFixed(2) + ' km';
  if (m >= 100)  return Math.round(m) + ' m';
  return m.toFixed(1) + ' m';
}

function onPosition(pos) {
  const { latitude: lat, longitude: lon, accuracy } = pos.coords;

  document.getElementById('gps-dot').className = 'active';
  document.getElementById('gps-text').textContent = 'GPS aktiv';
  document.getElementById('accuracy-bar').textContent =
    `Nøyaktighet: ± ${Math.round(accuracy)} m  |  ${lat.toFixed(6)}, ${lon.toFixed(6)}`;

  if (!centered) { map.setView([lat, lon], 17); centered = true; }

  if (!userDot) {
    userCircle = L.circle([lat, lon], {
      radius: Math.max(accuracy, 3),
      color: '#000', weight: 2, dashArray: '6 5',
      fillColor: '#000', fillOpacity: 0.08
    }).addTo(map);

    userDot = L.circleMarker([lat, lon], {
      radius: 10, color: '#fff', weight: 3,
      fillColor: '#000', fillOpacity: 1
    }).addTo(map).bindPopup('📍 Du er her');
  } else {
    userDot.setLatLng([lat, lon]);
    userCircle.setLatLng([lat, lon]);
    userCircle.setRadius(Math.max(accuracy, 3));
  }

  TARGETS.forEach((t, i) => {
    const dist = haversine(lat, lon, t.lat, t.lon);
    const reached = dist <= THRESHOLD;
    leafletMarkers[i].setIcon(reached ? greenIcon : redIcon);
    document.getElementById('dist-'+t.id).textContent = formatDist(dist);
    document.getElementById('dist-'+t.id).className = 'marker-dist' + (dist < 30 ? ' close' : '');
    document.getElementById('dot-'+t.id).className  = 'dot' + (reached ? ' green' : '');
    document.getElementById('row-'+t.id).className  = 'marker-row' + (reached ? ' reached' : '');
  });
}

function onError(err) {
  document.getElementById('gps-dot').className = 'error';
  const errMsg = document.getElementById('error-msg');
  errMsg.style.display = 'block';
  if (err.code === 1) {
    document.getElementById('gps-text').textContent = 'Tilgang nektet';
    errMsg.innerHTML = '⚠️ <b>Tilgang til posisjon ble nektet.</b><br>Klikk på hengelåsikonet i adressefeltet og tillat posisjon, og last deretter siden på nytt.';
  } else if (err.code === 2) {
    document.getElementById('gps-text').textContent = 'Posisjon utilgjengelig';
    errMsg.innerHTML = '⚠️ <b>Kunne ikke hente posisjon.</b><br>Sjekk at GPS/lokasjon er skrudd på på enheten.';
  } else {
    document.getElementById('gps-text').textContent = 'Tidsavbrudd';
    errMsg.innerHTML = '⚠️ <b>Tidsavbrudd.</b><br>Nettleseren fikk ikke posisjon i tide. Prøv å åpne filen via en lokal server i stedet for direkte fra disk, eller bruk Chrome og tillat lokasjon.';
  }
}

if ('geolocation' in navigator) {
  navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 60000
  });
} else {
  document.getElementById('gps-text').textContent = 'Geolokasjon støttes ikke';
  document.getElementById('gps-dot').className = 'error';
}
</script>
</body>
</html>
