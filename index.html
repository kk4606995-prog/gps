<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Markør Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #header h1 { font-size: 16px; font-weight: 600; color: #f1f5f9; }
  #gps-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8; }
  #gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; transition: background 0.4s; }
  #gps-dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e88; animation: blink 1.8s ease-in-out infinite; }
  #gps-dot.error { background: #ef4444; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #map { flex: 1; }
  #panel { background: #1a1d27; border-top: 1px solid #2d3148; flex-shrink: 0; max-height: 260px; overflow-y: auto; }

  .section-header {
    padding: 8px 16px 4px;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #475569; border-bottom: 1px solid #1e2235;
    display: flex; align-items: center; gap: 6px;
  }
  .section-header span { font-size: 13px; }

  .marker-row { display: flex; align-items: center; gap: 12px; padding: 9px 16px; border-bottom: 1px solid #1e2235; transition: background 0.2s; }
  .marker-row:last-child { border-bottom: none; }
  .marker-row.reached { background: #0f2918; }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; transition: background 0.4s, box-shadow 0.4s; }
  .dot.red { background: #ef4444; }
  .dot.blue { background: #3b82f6; }
  .dot.green { background: #22c55e; box-shadow: 0 0 8px #22c55e66; }
  .marker-name { font-size: 13px; font-weight: 500; color: #cbd5e1; flex: 1; }
  .marker-sub { font-size: 11px; color: #475569; }
  .marker-dist { font-size: 12px; color: #94a3b8; font-variant-numeric: tabular-nums; min-width: 65px; text-align: right; }
  .marker-dist.close { color: #22c55e; font-weight: 600; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 600; background: #22c55e22; color: #22c55e; display: none; margin-left: 4px; }
  .reached .badge { display: inline-block; }

  #accuracy-bar { padding: 7px 16px; font-size: 11px; color: #64748b; border-top: 1px solid #2d3148; }
  #error-msg { display: none; background: #1f1010; border: 1px solid #7f1d1d; color: #fca5a5; font-size: 13px; padding: 12px 16px; margin: 10px; border-radius: 8px; line-height: 1.6; }
</style>
</head>
<body>

<div id="header">
  <h1>📍 GPS Tracker – Lillehammer</h1>
  <div id="gps-status">
    <div id="gps-dot"></div>
    <span id="gps-text">Henter posisjon…</span>
  </div>
</div>

<div id="map"></div>

<div id="panel">
  <div class="section-header"><span>📌</span> GPS-punkter</div>
  <div id="list-gps"></div>
  <div class="section-header"><span>🍺</span> Barer &amp; Nattklubber</div>
  <div id="list-bars"></div>
  <div id="error-msg"></div>
  <div id="accuracy-bar">Nøyaktighet: —</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// --- GPS-punkter (røde) ---
const GPS_POINTS = [
  { id: "g1", name: "Punkt 1", lat: 61.117189391299775, lon: 10.464565025004918 },
  { id: "g2", name: "Punkt 2", lat: 61.117226018834366, lon: 10.46634523282882  },
  { id: "g3", name: "Punkt 3", lat: 61.11486228921843,  lon: 10.464810138284342 },
];

// --- Barer og nattklubber (blå) ---
const BARS = [
  { id: "b1", name: "Heim Lillehammer",    sub: "Gastropub · Storgata 84",   lat: 61.117152,   lon: 10.464584  },
  { id: "b2", name: "Kjøpstaden Sport bar",sub: "Sportsbar · Storgata 83",   lat: 61.117338,   lon: 10.465323  },
  { id: "b3", name: "1847 Brenneriet",     sub: "Nattklubb · Elvegata 19",   lat: 61.117172,   lon: 10.466530  },
  { id: "b4", name: "Toppen Skybar",       sub: "Skybar · Elvegata 12",      lat: 61.117212,   lon: 10.462206  },
  { id: "b5", name: "Paddy's",             sub: "Bar · Storgata 93",         lat: 61.118323,   lon: 10.464092  },
  { id: "b6", name: "Haakons Pub",         sub: "Pub · Storgata 95",         lat: 61.118503,   lon: 10.463915  },
  { id: "b7", name: "Wiese",              sub: "Bar/konsert · Storgata 31",  lat: 61.113027,   lon: 10.468077  },
];

const THRESHOLD = 25; // meter for fargebytte

const map = L.map('map', { zoomControl: true }).setView([61.116, 10.465], 16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 20, attribution: '© OpenStreetMap'
}).addTo(map);

function makeIcon(color, emoji) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 22 14 22S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="${color}" stroke="white" stroke-width="2"/>
    <circle cx="14" cy="14" r="6" fill="white" opacity="0.3"/>
    <text x="14" y="19" text-anchor="middle" font-size="11">${emoji}</text>
  </svg>`;
  return L.divIcon({ className:'', html:svg, iconSize:[28,36], iconAnchor:[14,36], popupAnchor:[0,-36] });
}

const icons = {
  gpsRed:   makeIcon('#ef4444','📍'),
  gpsGreen: makeIcon('#22c55e','✅'),
  barBlue:  makeIcon('#3b82f6','🍺'),
  barGreen: makeIcon('#22c55e','✅'),
};

// Lag leaflet-markører
const gpsMarkers = GPS_POINTS.map(p =>
  L.marker([p.lat, p.lon], { icon: icons.gpsRed }).addTo(map).bindPopup(`<b>${p.name}</b>`)
);
const barMarkers = BARS.map(b =>
  L.marker([b.lat, b.lon], { icon: icons.barBlue }).addTo(map).bindPopup(`<b>${b.name}</b><br><small>${b.sub}</small>`)
);

let userCircle = null;
let userDot    = null;
let centered   = false;

// Bygg UI-rader
function buildRows(items, containerId, dotClass) {
  const container = document.getElementById(containerId);
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'marker-row';
    row.id = 'row-' + item.id;
    row.innerHTML = `
      <div class="dot ${dotClass}" id="dot-${item.id}"></div>
      <div style="flex:1;min-width:0">
        <div class="marker-name">${item.name}</div>
        ${item.sub ? `<div class="marker-sub">${item.sub}</div>` : ''}
      </div>
      <span class="marker-dist" id="dist-${item.id}">—</span>
      <span class="badge">✓ Nådd</span>
    `;
    container.appendChild(row);
  });
}

buildRows(GPS_POINTS, 'list-gps', 'red');
buildRows(BARS,       'list-bars', 'blue');

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(m) {
  if (m >= 1000) return (m/1000).toFixed(2) + ' km';
  if (m >= 100)  return Math.round(m) + ' m';
  return m.toFixed(1) + ' m';
}

function updateGroup(items, leafletMks, lat, lon, iconNormal, iconGreen, dotNormal) {
  items.forEach((item, i) => {
    const dist = haversine(lat, lon, item.lat, item.lon);
    const reached = dist <= THRESHOLD;
    leafletMks[i].setIcon(reached ? iconGreen : iconNormal);
    const distEl = document.getElementById('dist-' + item.id);
    const dotEl  = document.getElementById('dot-'  + item.id);
    const rowEl  = document.getElementById('row-'  + item.id);
    distEl.textContent = formatDist(dist);
    distEl.className   = 'marker-dist' + (dist < 50 ? ' close' : '');
    dotEl.className    = 'dot ' + (reached ? 'green' : dotNormal);
    rowEl.className    = 'marker-row' + (reached ? ' reached' : '');
  });
}

function onPosition(pos) {
  const { latitude: lat, longitude: lon, accuracy } = pos.coords;
  document.getElementById('gps-dot').className = 'active';
  document.getElementById('gps-text').textContent = 'GPS aktiv';
  document.getElementById('accuracy-bar').textContent =
    `Nøyaktighet: ± ${Math.round(accuracy)} m  |  ${lat.toFixed(6)}, ${lon.toFixed(6)}`;

  if (!centered) { map.setView([lat, lon], 17); centered = true; }

  if (!userDot) {
    userCircle = L.circle([lat, lon], {
      radius: Math.max(accuracy, 3),
      color: '#000', weight: 2, dashArray: '6 5',
      fillColor: '#000', fillOpacity: 0.08
    }).addTo(map);
    userDot = L.circleMarker([lat, lon], {
      radius: 10, color: '#fff', weight: 3,
      fillColor: '#000', fillOpacity: 1
    }).addTo(map).bindPopup('📍 Du er her');
  } else {
    userDot.setLatLng([lat, lon]);
    userCircle.setLatLng([lat, lon]);
    userCircle.setRadius(Math.max(accuracy, 3));
  }

  updateGroup(GPS_POINTS, gpsMarkers, lat, lon, icons.gpsRed,  icons.gpsGreen, 'red');
  updateGroup(BARS,       barMarkers, lat, lon, icons.barBlue, icons.barGreen, 'blue');
}

function onError(err) {
  document.getElementById('gps-dot').className = 'error';
  const errMsg = document.getElementById('error-msg');
  errMsg.style.display = 'block';
  if (err.code === 1) {
    document.getElementById('gps-text').textContent = 'Tilgang nektet';
    errMsg.innerHTML = '⚠️ <b>Tilgang nektet.</b> Klikk på 🔒 i adressefeltet → Lokasjon → Tillat, og last siden på nytt.';
  } else if (err.code === 2) {
    document.getElementById('gps-text').textContent = 'Posisjon utilgjengelig';
    errMsg.innerHTML = '⚠️ <b>Kunne ikke hente posisjon.</b> Sjekk at GPS/lokasjon er på.';
  } else {
    document.getElementById('gps-text').textContent = 'Tidsavbrudd';
    errMsg.innerHTML = '⚠️ <b>Tidsavbrudd.</b> Sørg for at lokasjon er tillatt i nettleseren.';
  }
}

if ('geolocation' in navigator) {
  navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true, maximumAge: 0, timeout: 60000
  });
} else {
  document.getElementById('gps-text').textContent = 'Geolokasjon støttes ikke';
  document.getElementById('gps-dot').className = 'error';
}
</script>
</body>
</html>
